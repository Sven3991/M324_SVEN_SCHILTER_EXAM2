name: AI Custom Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-custom-review:
    runs-on: ubuntu-latest

    steps:
      - name: Pull image
        run: docker pull sven3991/ai-custom-review:latest

      - name: Run container
        id: review
        shell: bash
        run: |
          echo "review=$(docker run --rm sven3991/ai-custom-review:latest)" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `# 🤖 AI Custom Review

              ${{ steps.review.outputs.review }}`
            })
